<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>手势控制星空网页</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000011; }
    canvas { display: block; position: fixed; top: 0; left: 0; }
    #video { display: none; }
    #camera-preview {
      position: fixed; bottom: 20px; left: 20px;
      width: 200px; height: 150px; border-radius: 12px;
      border: 2px solid rgba(100, 200, 255, 0.5); object-fit: cover;
      transform: scaleX(-1); z-index: 100; background: #000;
    }
    #gesture-status {
      position: fixed; bottom: 180px; left: 20px; width: 200px;
      text-align: center; z-index: 100; color: rgba(100, 200, 255, 0.9); font-size: 14px;
    }
    #gesture-status .label { font-size: 11px; opacity: 0.6; margin-bottom: 4px; }
    #gesture-status .state { font-size: 16px; font-weight: bold; letter-spacing: 2px; }
    #start-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 10, 0.95); display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 200; color: #fff;
    }
    #start-overlay h1 { font-size: 28px; margin-bottom: 12px; letter-spacing: 4px; color: rgba(100, 200, 255, 0.9); }
    #start-overlay p { font-size: 14px; opacity: 0.6; margin-bottom: 30px; text-align: center; line-height: 1.8; }
    #start-btn {
      padding: 14px 40px; font-size: 16px; background: transparent;
      border: 2px solid rgba(100, 200, 255, 0.7); color: rgba(100, 200, 255, 0.9);
      cursor: pointer; letter-spacing: 3px; transition: all 0.3s; font-family: inherit;
    }
    #start-btn:hover { background: rgba(100, 200, 255, 0.15); box-shadow: 0 0 30px rgba(100, 200, 255, 0.3); }
  </style>
</head>
<body>

<div id="start-overlay">
  <h1>星 空</h1>
  <p>捏合手指 · 控制聚散<br>旋转手掌 · 控制旋转</p>
  <button id="start-btn">开启摄像头</button>
</div>

<canvas id="canvas"></canvas>
<video id="video" playsinline></video>
<img id="camera-preview">

<div id="gesture-status">
  <div class="label">手势状态</div>
  <div class="state" id="state-text">—</div>
</div>

<script src="https://unpkg.com/@mediapipe/hands@0.4.1675469240/hands.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js" crossorigin="anonymous"></script>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const video = document.getElementById('video');
const cameraPreview = document.getElementById('camera-preview');
const startOverlay = document.getElementById('start-overlay');
const startBtn = document.getElementById('start-btn');
const stateText = document.getElementById('state-text');

let width, height;
let stars = [];
let gestureFactor = 0;
let targetGestureFactor = 0;
let rotationSpeed = 0;
let targetRotationSpeed = 0;
let hands = null;
let lastPinchDistance = null;
let lastPalmAngle = null;
let time = 0;

const STAR_COUNT = 1200;

class Star {
  constructor() { this.reset(); }
  
  reset() {
    this.angle = Math.random() * Math.PI * 2;
    // 覆盖屏幕4个角的距离：屏幕对角线的1.2倍
    const diagonal = Math.sqrt(width * width + height * height);
    this.radius = Math.random() * diagonal * 1.2;
    this.x = width / 2 + Math.cos(this.angle) * this.radius;
    this.y = height / 2 + Math.sin(this.angle) * this.radius;
    this.baseAngle = this.angle;
    this.baseRadius = this.radius;
    this.size = Math.random() * 2 + 0.5;
    this.twinkleSpeed = Math.random() * 0.03 + 0.01;
    this.twinkleOffset = Math.random() * Math.PI * 2;
    this.driftSpeed = Math.random() * 0.00008 + 0.00003;
    this.driftAngle = Math.random() * Math.PI * 2;
  }
  
  update(dt, factor, rotSpeed) {
    this.baseAngle += rotSpeed * dt;
    this.baseRadius += Math.sin(this.driftAngle + time * 0.0005) * 0.1;
    
    const centerPull = factor * 0.85;
    const currentRadius = this.baseRadius * (1 - centerPull);
    
    this.x = width / 2 + Math.cos(this.baseAngle) * currentRadius;
    this.y = height / 2 + Math.sin(this.baseAngle) * currentRadius;
  }
  
  draw() {
    const brightness = 0.4 + 0.6 * Math.abs(Math.sin(time * this.twinkleSpeed + this.twinkleOffset));
    const alpha = brightness;
    
    const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 4);
    gradient.addColorStop(0, `rgba(200, 220, 255, ${alpha * 0.4})`);
    gradient.addColorStop(1, 'rgba(200, 220, 255, 0)');
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * 4, 0, Math.PI * 2);
    ctx.fillStyle = gradient;
    ctx.fill();
    
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(220, 235, 255, ${alpha})`;
    ctx.fill();
  }
}

function resize() {
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
}

function initStars() {
  stars = [];
  const diagonal = Math.sqrt(width * width + height * height);
  for (let i = 0; i < STAR_COUNT; i++) {
    const star = new Star();
    // 确保星星从中心分布到屏幕对角线的2倍
    star.radius = Math.random() * diagonal * 2;
    star.baseRadius = star.radius;
    star.x = width / 2 + Math.cos(star.angle) * star.radius;
    star.y = height / 2 + Math.sin(star.angle) * star.radius;
    stars.push(star);
  }
}

function drawBackground() {
  const gradient = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, Math.max(width, height) * 0.7);
  gradient.addColorStop(0, '#000022');
  gradient.addColorStop(1, '#000011');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, width, height);
}

let lastTime = 0;
function render(timestamp) {
  const dt = timestamp - lastTime;
  lastTime = timestamp;
  time = timestamp;
  
  gestureFactor += (targetGestureFactor - gestureFactor) * 0.06;
  rotationSpeed += (targetRotationSpeed - rotationSpeed) * 0.03;
  
  drawBackground();
  
  for (const star of stars) {
    star.update(dt, gestureFactor, rotationSpeed);
    star.draw();
  }
  
  requestAnimationFrame(render);
}

function onResults(results) {
  if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
    const landmarks = results.multiHandLandmarks[0];
    
    // 捏合检测
    const thumb = landmarks[4];
    const index = landmarks[8];
    const dx = thumb.x - index.x;
    const dy = thumb.y - index.y;
    const distance = Math.sqrt(dx * dx + dy * dy);
    
    if (lastPinchDistance !== null) {
      const delta = lastPinchDistance - distance;
      targetGestureFactor = Math.max(0, Math.min(1, targetGestureFactor + delta * 6));
      
      if (distance < 0.08) {
        stateText.textContent = '◆ 聚拢';
        stateText.style.color = 'rgba(100, 200, 255, 1)';
      } else if (distance > 0.14) {
        stateText.textContent = '◇ 分散';
        stateText.style.color = 'rgba(180, 160, 255, 0.9)';
      }
    }
    lastPinchDistance = distance;
    
    // 手掌旋转检测
    const wrist = landmarks[0];
    const middleBase = landmarks[9];
    const palmAngle = Math.atan2(middleBase.y - wrist.y, middleBase.x - wrist.x);
    
    if (lastPalmAngle !== null) {
      let deltaAngle = palmAngle - lastPalmAngle;
      if (deltaAngle > Math.PI) deltaAngle -= 2 * Math.PI;
      if (deltaAngle < -Math.PI) deltaAngle += 2 * Math.PI;
      
      // 翻转旋转方向
      targetRotationSpeed = Math.max(-0.005, Math.min(0.005, targetRotationSpeed - deltaAngle * 0.0008));
      
      if (Math.abs(targetRotationSpeed) > 0.0005) {
        const rotDir = targetRotationSpeed > 0 ? '→' : '←';
        const rotStrength = Math.round(Math.abs(targetRotationSpeed) / 0.003);
        stateText.textContent = rotDir.repeat(Math.min(rotStrength, 3));
        stateText.style.color = 'rgba(100, 255, 200, 0.9)';
      }
    }
    lastPalmAngle = palmAngle;
    
  } else {
    if (lastPinchDistance !== null || lastPalmAngle !== null) {
      stateText.textContent = '—';
      stateText.style.color = 'rgba(100, 200, 255, 0.6)';
    }
    lastPinchDistance = null;
    lastPalmAngle = null;
    targetRotationSpeed *= 0.95;
  }
}

async function initHandTracking() {
  hands = new Hands({
    locateFile: (file) => `https://unpkg.com/@mediapipe/hands@0.4.1675469240/${file}`
  });
  
  hands.setOptions({
    maxNumHands: 1,
    modelComplexity: 1,
    minDetectionConfidence: 0.5,
    minTrackingConfidence: 0.4
  });
  
  hands.onResults(onResults);
  
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width: 640, height: 480, facingMode: 'user' }
    });
    
    video.srcObject = stream;
    await video.play();
    cameraPreview.srcObject = stream;
    
    async function detectLoop() {
      if (hands && video.readyState >= 2) {
        await hands.send({ image: video });
      }
      requestAnimationFrame(detectLoop);
    }
    detectLoop();
    
  } catch (err) {
    console.error('Camera error:', err);
    stateText.textContent = '摄像头错误';
  }
}

window.addEventListener('resize', () => { resize(); initStars(); });

resize();
initStars();

startBtn.addEventListener('click', async () => {
  startOverlay.style.display = 'none';
  await initHandTracking();
  requestAnimationFrame(render);
});
</script>
</body>
</html>
